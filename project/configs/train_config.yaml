augmentation:
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
  horizontal_flip: 0.5
  rotation: 15
classes:
- buildings
- forest
- glacier
- mountain
- sea
- street
data:
  batch_size: 32
  img_size: 224
  num_workers: 4
  test_dir: data/seg_test/seg_test
  train_dir: data/seg_train/seg_train
model:
  backbone: resnet18
  num_classes: 6
  pretrained: true
training:
  device: cuda
  epochs: 20
  lr: 0.001
  scheduler_gamma: 0.1
  scheduler_step: 7
  weight_decay: 0.0001
